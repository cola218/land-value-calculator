<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>土地估價工具</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>土地估價工具</h1>
    <p style="text-align:center;color:gray;">
輸入區域 + 坪數，自動估算市場價值
</p>

    <label>行政區</label>
    <input id="area" placeholder="例如：台中西區">

    <label>坪數</label>
    <input id="ping" type="number" placeholder="例如：50">

    <button onclick="calc()">計算總價</button>

    <h2 id="result"></h2>

    <hr>

    <h3>坪 ↔ 平方公尺</h3>
    <input id="m2" placeholder="平方公尺">
    <button onclick="toPing()">轉坪</button>

    <input id="ping2" placeholder="坪數">
    <button onclick="toM2()">轉平方公尺</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
